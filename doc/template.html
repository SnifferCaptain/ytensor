<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ytensor Docs</title>
    <!-- 引入字体和库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            /* 调色板 (Slate系) */
            --bg: #ffffff;
            --bg-secondary: #f8fafc;
            --sidebar-bg: rgba(255, 255, 255, 0.8);
            --header-bg: rgba(255, 255, 255, 0.8);
            
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-light: #eff6ff;
            --hover: #f1f5f9;
            
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-code: 'JetBrains Mono', Consolas, monospace;
            
            --radius: 8px;
            --header-height: 64px;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --sidebar-bg: rgba(15, 23, 42, 0.8);
            --header-bg: rgba(15, 23, 42, 0.8);
            
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            
            --border: #334155;
            --primary: #60a5fa;
            --primary-light: rgba(59, 130, 246, 0.15);
            --hover: #1e293b;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            font-family: var(--font-main); 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
        
        /* HEADER */
        header { 
            height: var(--header-height); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 24px; 
            flex-shrink: 0;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
            position: relative;
        }
        
        .brand { 
            font-weight: 700; 
            font-size: 1.1rem; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            color: var(--text);
            letter-spacing: -0.02em;
        }
        
        .controls { display: flex; gap: 8px; align-items: center; }
        
        .btn-icon { 
            cursor: pointer; 
            border: 1px solid transparent; 
            background: transparent; 
            color: var(--text-secondary); 
            padding: 6px; 
            border-radius: var(--radius); 
            transition: 0.2s; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon:hover { background: var(--hover); color: var(--primary); }
        
        .lang-btn {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--text-secondary);
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .lang-btn:hover { background: var(--hover); }
        .lang-btn.active { 
            background: var(--primary-light); 
            color: var(--primary); 
            border-color: transparent;
        }

        /* LAYOUT */
        .layout { display: flex; flex: 1; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            backdrop-filter: blur(12px);
        }
        .tree-container { flex: 1; overflow-y: auto; padding: 16px 12px; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li ul { padding-left: 16px; display: none; border-left: 1px solid var(--border); margin-left: 12px; }
        li ul.open { display: block; animation: slideDown 0.2s ease-out; }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .nav-item, .folder-header {
            display: flex; 
            align-items: center; 
            padding: 8px 12px; 
            cursor: pointer; 
            font-size: 0.9rem;
            color: var(--text-secondary); 
            border-radius: 6px;
            user-select: none;
            text-decoration: none; 
            margin-bottom: 2px;
            transition: all 0.15s ease;
        }
        
        .nav-item:hover, .folder-header:hover { background: var(--hover); color: var(--text); }
        
        .nav-item.active { 
            background: var(--primary-light); 
            color: var(--primary); 
            font-weight: 500; 
        }
        
        .icon-svg { width: 16px; height: 16px; margin-right: 10px; opacity: 0.7; flex-shrink: 0; }
        .arrow { margin-left: auto; width: 14px; height: 14px; transition: transform 0.2s; opacity: 0.5; }
        .folder-header.open .arrow { transform: rotate(90deg); }

        /* CONTENT */
        .main-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px 60px; 
            scroll-behavior: smooth; 
            position: relative; 
            background: var(--bg);
        }
        
        .markdown-body { 
            max-width: 820px; 
            margin: 0 auto; 
            padding-bottom: 100px; 
            line-height: 1.7;
            font-size: 16px;
        }
        
        /* Markdown Styles Refined */
        .markdown-body h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 1rem; border-bottom: none; }
        .markdown-body h2 { font-size: 1.6rem; font-weight: 700; margin-top: 2.5em; padding-bottom: 0.5em; border-bottom: 1px solid var(--border); letter-spacing: -0.01em; }
        .markdown-body h3 { font-size: 1.3rem; font-weight: 600; margin-top: 2em; }
        .markdown-body p { margin-bottom: 1.2em; color: var(--text); }
        
        .markdown-body a { color: var(--primary); text-decoration: none; font-weight: 500; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
        .markdown-body a:hover { border-bottom-color: var(--primary); }
        
        /* Code Blocks */
        .markdown-body pre { 
            background: #f5f2eb; /* Light mode: beige */
            padding: 20px; 
            border-radius: 8px; 
            position: relative; 
            overflow-x: auto; 
            margin: 1.5em 0;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        [data-theme="dark"] .markdown-body pre { 
            background: #1e293b; /* Dark mode: dark blue-gray */
            border: 1px solid #334155; 
        }

        .markdown-body code { font-family: var(--font-code); font-size: 0.9em; }
        
        /* Inline Code */
        .markdown-body p code, .markdown-body li code { 
            background: var(--bg-secondary); 
            padding: 2px 6px; 
            border-radius: 4px; 
            color: var(--primary); 
            border: 1px solid var(--border);
            font-size: 0.85em;
        }
        
        .markdown-body blockquote { 
            border-left: 4px solid var(--primary); 
            background: var(--bg-secondary);
            padding: 16px 20px; 
            color: var(--text-secondary); 
            margin: 24px 0; 
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        /* Admonitions (Callouts) */
        .admonition {
            margin: 1.5em 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid transparent;
            box-shadow: var(--shadow);
        }
        .admonition-title {
            padding: 8px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .admonition-content {
            padding: 16px;
            background: var(--bg-secondary);
        }
        /* Types */
        .admonition.info { border-color: #3b82f6; }
        .admonition.info .admonition-title { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        
        .admonition.warning { border-color: #f59e0b; }
        .admonition.warning .admonition-title { background: rgba(245, 158, 11, 0.1); color: #d97706; }
        
        .admonition.tip { border-color: #10b981; }
        .admonition.tip .admonition-title { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        
        .admonition.error { border-color: #ef4444; }
        .admonition.error .admonition-title { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        /* Dark Mode Adjustments */
        [data-theme="dark"] .admonition-content { background: rgba(255,255,255,0.03); }
        [data-theme="dark"] .admonition.warning .admonition-title { color: #fbbf24; }
        
        .markdown-body img { max-width: 100%; border-radius: 8px; box-shadow: var(--shadow); margin: 20px 0; }
        
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.95em; }
        .markdown-body th, .markdown-body td { padding: 12px; border: 1px solid var(--border); text-align: left; }
        .markdown-body th { background: var(--bg-secondary); font-weight: 600; }
        .markdown-body tr:nth-child(even) { background: var(--bg-secondary); }

        /* Copy Button - Light Mode */
        .copy-btn { 
            position: absolute; top: 10px; right: 10px; 
            font-size: 12px; color: #64748b; 
            background: rgba(0,0,0,0.05); 
            border: 1px solid rgba(0,0,0,0.1);
            padding: 4px 8px; border-radius: 4px; 
            opacity: 0; transition: 0.2s; cursor: pointer;
        }
        .markdown-body pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: rgba(0,0,0,0.1); color: #1e293b; }
        
        /* Copy Button - Dark Mode */
        [data-theme="dark"] .copy-btn { 
            color: #94a3b8; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        [data-theme="dark"] .copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }

        /* Search Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 100; justify-content: center; padding-top: 120px; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content { 
            background: var(--bg); 
            width: 600px; max-width: 90%; 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; flex-direction: column; 
            max-height: 60vh; 
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        
        .search-input { 
            padding: 20px; font-size: 1.1rem; 
            border: none; border-bottom: 1px solid var(--border); 
            background: var(--bg); color: var(--text); 
            outline: none; font-family: var(--font-main);
        }
        
        .search-results { overflow-y: auto; padding: 10px; }
        .result-item { 
            padding: 12px 16px; cursor: pointer; 
            border-radius: 6px; margin-bottom: 4px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .result-item:hover { background: var(--primary-light); }
        .result-item strong { color: var(--primary); font-size: 0.95rem; }
        .result-item small { color: var(--text-tertiary); font-size: 0.8rem; }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; z-index: 20; transition: 0.3s; }
            .sidebar.show { left: 0; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }
            .main-content { padding: 20px; }
            .menu-toggle { display: block; }
        }
        .menu-toggle { display: none; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="menu-toggle" onclick="toggleSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--primary);"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        ytensor
    </div>
    <div class="controls">
        <div id="lang-buttons" style="display: flex; gap: 4px; margin-right: 10px;"></div>
        
        <button class="btn-icon" onclick="openSearch()" title="Search (Ctrl+K)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        
        <button class="btn-icon" onclick="toggleTheme()" title="Toggle Theme">
            <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </div>
</header>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <nav class="tree-container" id="menu-root"></nav>
    </aside>
    <main class="main-content" onclick="closeSidebarMobile()">
        <div id="content" class="markdown-body"></div>
    </main>
</div>

<div id="search-modal" class="modal" onclick="if(event.target===this) closeSearch()">
    <div class="modal-content">
        <input type="text" class="search-input" id="search-input" placeholder="Search documentation...">
        <div class="search-results" id="search-results"></div>
    </div>
</div>

<script>
    // ==========================================
    // 1. 数据注入
    // ==========================================
    const RAW_DATA = /* __INJECT_DATA_HERE__ */ null;
    const DATA = RAW_DATA || { docs: {}, menu: {} };
    const LANGS = Object.keys(DATA.menu).sort();

    // Icons
    const ICONS = {
        file: `<svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>`,
        folder: `<svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`,
        arrow: `<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>`
    };

    // ==========================================
    // 2. 状态管理
    // ==========================================
    const state = {
        lang: localStorage.getItem('ytensor_lang') || (LANGS[0] || 'en'),
        path: '',
        expanded: JSON.parse(localStorage.getItem('ytensor_expanded') || '[]')
    };
    
    // Custom Extension for ::: syntax
    showdown.extension('admonition', function() {
        return [{
            type: 'lang', // Changed from 'output' to 'lang'
            regex: /:::(\w+)([^\n]*)\n([\s\S]*?)\n:::/g,
            replace: function(match, type, title, content) {
                // Use a separate converter to render the inner content
                // entirely as independent markdown.
                const subConverter = new showdown.Converter({
                    tables: true, 
                    tasklists: true, 
                    ghCodeBlocks: true,
                    simplifiedAutoLink: true,
                    strikethrough: true
                });
                const renderedContent = subConverter.makeHtml(content);

                return `<div class="admonition ${type}">
                            <div class="admonition-title">${title.trim() || type.toUpperCase()}</div>
                            <div class="admonition-content">${renderedContent}</div>
                        </div>`;
            }
        }];
    });

    // Extension to protect inline markdown in headings
    showdown.extension('escapeHeadings', function() {
        return [{
            type: 'lang',
            filter: function(text) {
                // Replace headings with escaped underscores to prevent italic parsing
                return text.replace(/^(#{1,6})\s+(.+)$/gm, function(match, hashes, content) {
                    // Escape underscores in heading content by wrapping them in backticks temporarily
                    const escaped = content.replace(/_/g, '\\_');
                    return `${hashes} ${escaped}`;
                });
            }
        }];
    });

    const converter = new showdown.Converter({
        tables: true, 
        tasklists: true, 
        ghCodeBlocks: true,
        simplifiedAutoLink: true,
        strikethrough: true,
        extensions: ['escapeHeadings', 'admonition']
    });

    // ==========================================
    // 3. 初始化
    // ==========================================
    function init() {
        if (!RAW_DATA) {
            document.getElementById('content').innerHTML = `<div style="text-align:center; margin-top:50px;"><h2>⚠️ Build Required</h2><p>Please run <code>python build.py</code> to generate the documentation.</p></div>`;
            return;
        }

        renderLangButtons();
        if (!LANGS.includes(state.lang) && LANGS.length > 0) state.lang = LANGS[0];
        
        // Theme Init
        const savedTheme = localStorage.getItem('ytensor_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
        updateHljsTheme(savedTheme);

        switchLang(state.lang, false);

        document.addEventListener('keydown', e => {
            if((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
            if(e.key === 'Escape') closeSearch();
        });
    }

    // ==========================================
    // 4. 核心逻辑
    // ==========================================
    function switchLang(newLang, resetToHome = true) {
        const oldLang = state.lang;
        state.lang = newLang;
        localStorage.setItem('ytensor_lang', newLang);

        document.querySelectorAll('#lang-buttons button').forEach(b => {
            b.classList.toggle('active', b.dataset.lang === newLang);
        });

        renderMenu();

        let targetPath = `${newLang}/README.mdx`;
        if (!resetToHome && state.path) {
            const suffix = state.path.replace(new RegExp(`^${oldLang}/`), '');
            const candidate = `${newLang}/${suffix}`;
            if (DATA.docs[candidate]) targetPath = candidate;
        }
        loadPage(targetPath);
    }

    function loadPage(path) {
        if (!DATA.docs[path]) {
            if (!DATA.docs[`${state.lang}/README.mdx`]) return;
            path = `${state.lang}/README.mdx`;
        }

        state.path = path;
        
        const html = converter.makeHtml(DATA.docs[path]);
        const contentDiv = document.getElementById('content');
        contentDiv.style.opacity = '0';
        
        setTimeout(() => {
            contentDiv.innerHTML = html;
            contentDiv.style.opacity = '1';
            document.querySelector('.main-content').scrollTop = 0;

            contentDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            
            contentDiv.querySelectorAll('pre').forEach(pre => {
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = 'Copy';
                btn.onclick = () => {
                    navigator.clipboard.writeText(pre.innerText);
                    btn.innerText = 'Copied!';
                    setTimeout(() => btn.innerText = 'Copy', 2000);
                };
                pre.appendChild(btn);
            });

            contentDiv.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', handleInternalLink);
            });

            highlightSidebar();
        }, 100); // Simple fade transition
    }

    function handleInternalLink(e) {
        const href = this.getAttribute('href');
        if (!href || href.startsWith('http') || href.startsWith('//') || href.startsWith('#')) return;

        if (href.endsWith('.md') || href.endsWith('.mdx')) {
            e.preventDefault();
            const absolutePath = resolvePath(state.path, href);
            loadPage(absolutePath);
            // Mobile: close sidebar on click
            if(window.innerWidth <= 768) closeSidebarMobile();
        }
    }

    function resolvePath(currentPath, relativeLink) {
        const stack = currentPath.split('/');
        stack.pop();
        const parts = relativeLink.split('/');
        for (const part of parts) {
            if (part === '.') continue;
            if (part === '..') { if (stack.length > 0) stack.pop(); } 
            else { stack.push(part); }
        }
        return stack.join('/');
    }

    // ==========================================
    // 5. 菜单渲染
    // ==========================================
    function renderMenu() {
        const root = document.getElementById('menu-root');
        root.innerHTML = '';
        const treeData = DATA.menu[state.lang] || [];
        const ul = document.createElement('ul');
        treeData.forEach(node => ul.appendChild(createNode(node)));
        root.appendChild(ul);
        
        state.expanded.forEach(name => {
            const header = document.getElementById(`folder-${name}`);
            if (header) {
                header.classList.add('open');
                header.nextElementSibling.classList.add('open');
            }
        });
    }

    function createNode(node) {
        const li = document.createElement('li');
        if (node.type === 'file') {
            const a = document.createElement('div'); // Use div for better control
            a.className = 'nav-item';
            a.dataset.path = node.path;
            a.innerHTML = `${ICONS.file} ${node.name}`;
            a.onclick = () => loadPage(node.path);
            li.appendChild(a);
        } else {
            const div = document.createElement('div');
            div.className = 'folder-header';
            div.id = `folder-${node.name}`;
            div.innerHTML = `${ICONS.folder} ${node.name} ${ICONS.arrow}`;
            
            const ul = document.createElement('ul');
            node.children.forEach(child => ul.appendChild(createNode(child)));
            
            div.onclick = () => {
                div.classList.toggle('open');
                ul.classList.toggle('open');
                if (div.classList.contains('open')) {
                    if (!state.expanded.includes(node.name)) state.expanded.push(node.name);
                } else {
                    state.expanded = state.expanded.filter(n => n !== node.name);
                }
                localStorage.setItem('ytensor_expanded', JSON.stringify(state.expanded));
            };
            li.appendChild(div);
            li.appendChild(ul);
        }
        return li;
    }

    function highlightSidebar() {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const active = document.querySelector(`.nav-item[data-path="${state.path}"]`);
        if (active) {
            active.classList.add('active');
            let parent = active.closest('ul');
            while (parent && parent.parentElement.tagName === 'LI') {
                parent.classList.add('open');
                parent.previousElementSibling.classList.add('open');
                parent = parent.parentElement.closest('ul');
            }
        }
    }

    // ==========================================
    // 6. UI 辅助
    // ==========================================
    function renderLangButtons() {
        const container = document.getElementById('lang-buttons');
        container.innerHTML = '';
        LANGS.forEach(l => {
            const btn = document.createElement('button');
            btn.className = 'lang-btn';
            btn.textContent = l.toUpperCase();
            btn.dataset.lang = l;
            btn.onclick = () => switchLang(l, false);
            container.appendChild(btn);
        });
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('ytensor_theme', next);
        updateThemeIcon(next);
        updateHljsTheme(next);
    }

    function updateThemeIcon(theme) {
        const icon = document.getElementById('theme-icon');
        if(theme === 'dark') {
            // Moon icon
            icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        } else {
            // Sun icon
            icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
        }
    }

    function updateHljsTheme(theme) {
        const hljsLink = document.getElementById('hljs-theme');
        if(theme === 'dark') {
            hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css';
        } else {
            hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css';
        }
    }

    function openSearch() { document.getElementById('search-modal').style.display = 'flex'; document.getElementById('search-input').focus(); }
    function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
    
    // Mobile Sidebar
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }
    function closeSidebarMobile() { document.getElementById('sidebar').classList.remove('show'); }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        const resDiv = document.getElementById('search-results');
        resDiv.innerHTML = '';
        if (!val) return;

        Object.keys(DATA.docs).forEach(path => {
            if (!path.startsWith(state.lang)) return;
            const content = DATA.docs[path].toLowerCase();
            if (path.toLowerCase().includes(val) || content.includes(val)) {
                const div = document.createElement('div');
                div.className = 'result-item';
                const title = path.split('/').pop().replace('.mdx', '').replace('.md', '');
                // Simple snippet extraction
                const idx = content.indexOf(val);
                const snippet = idx > -1 ? content.substring(Math.max(0, idx - 20), Math.min(content.length, idx + 50)) + '...' : '';
                
                div.innerHTML = `<div><strong>${title}</strong></div><small>${snippet}</small>`;
                div.onclick = () => { loadPage(path); closeSearch(); };
                resDiv.appendChild(div);
            }
        });
    });

    init();
</script>
</body>
</html>
